name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm install

      - name: Lint Frontend
        run: |
          cd apps/web
          npm install
          npm run lint || echo "Linting frontend not fully configured yet"

      - name: Build Frontend
        run: |
          cd apps/web
          npm run build

      - name: Lint Backend
        run: |
          cd apps/api
          npm install
          npm run lint || echo "Linting backend not fully configured yet"

      - name: Build Backend
        run: |
          cd apps/api
          npm run build

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Worker Dependencies
        run: |
          cd services/doc-worker
          pip install -r requirements.txt
          pip install pytest

      - name: Test Python Worker
        run: |
          cd services/doc-worker
          # pytest # Uncomment when tests are written
          echo "Python tests will run here"
