# Full stack per docs/07-DEPLOYMENT.md. Copy .env.example → .env at the repo root first.
# Dev tip: `docker compose up db redis minio` and run api/web locally with pnpm dev.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-lingo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lingo}
      POSTGRES_DB: ${DB_NAME:-lingobridge}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lingo}"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_PORT=3000
      - WEB_ORIGIN=${WEB_ORIGIN:-http://localhost}
      - DATABASE_URL=postgresql://${DB_USER:-lingo}:${DB_PASSWORD:-lingo}@db:5432/${DB_NAME:-lingobridge}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      - REDIS_URL=redis://redis:6379
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-lingo-files}
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-20}
      - WORKER_TOKEN=${WORKER_TOKEN}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  doc-worker:
    build:
      context: ../services/doc-worker
    environment:
      - REDIS_URL=redis://redis:6379
      - API_BASE_URL=http://api:3000/api
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-lingo-files}
      - WORKER_TOKEN=${WORKER_TOKEN}
      - TESSERACT_LANGS=${TESSERACT_LANGS:-eng+rus+uzb}
    depends_on:
      - redis
      - minio
      - api

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - api
      - web

volumes:
  db_data:
  redis_data:
  minio_data:
  caddy_data:
